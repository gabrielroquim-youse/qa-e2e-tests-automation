# PR Quality Checklist - Youse QA E2E
#
# Roda em todo PR para `main` e faz tres coisas:
#   1. Analise estatica completa (typecheck + lint + format + qa-checks)
#   2. Solicita review automatico do GitHub Copilot
#   3. Posta comentario com checklist auto-preenchido
#
# Permissoes necessarias:
#   contents: read        - checkout
#   pull-requests: write  - postar comentario e solicitar Copilot review

name: PR Quality Checklist

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Job 1 - Analise estatica (typecheck + lint + format + qa-checks)
  static-analysis:
    name: AnĂˇlise EstĂˇtica
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      typecheck: ${{ steps.typecheck.outcome }}
      lint:      ${{ steps.lint.outcome }}
      format:    ${{ steps.format.outcome }}
      qa_checks: ${{ steps.qa.outcome }}
      qa_report: ${{ steps.qa.outputs.report }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependĂŞncias
        run: npm ci

      - name: TypeScript (typecheck)
        id: typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: ESLint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Prettier (format:check)
        id: format
        run: npm run format:check
        continue-on-error: true

      - name: QA Checks (qa-pre-commit-checks em modo PR)
        id: qa
        run: |
          PR_BASE=origin/main \
          QA_REPORT_JSON=/tmp/qa-report.json \
          npx ts-node --transpile-only scripts/qa-pre-commit-checks.ts
          echo "report=$(cat /tmp/qa-report.json | jq -c .)" >> $GITHUB_OUTPUT
        continue-on-error: true

  # Job 2 - Solicita Copilot Review (nativo do GitHub)
  copilot-review:
    name: Solicitar Copilot Review
    runs-on: ubuntu-latest
    needs: static-analysis
    # SĂł executa uma vez (quando o PR Ă© aberto), nĂŁo a cada push
    if: github.event.action == 'opened'

    steps:
      - name: Solicitar review do GitHub Copilot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: [],
              team_reviewers: [],
            });

            // Solicita Copilot code review via endpoint especĂ­fico
            try {
              await github.request('POST /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: ['copilot'],
              });
              console.log('âś… Copilot review solicitado.');
            } catch (e) {
              console.log(`â„ąď¸Ź Copilot review via API: ${e.message}`);
            }

  # Job 3 - Comentario com checklist auto-preenchido
  post-checklist:
    name: ComentĂˇrio Checklist
    runs-on: ubuntu-latest
    needs: static-analysis
    if: always()

    steps:
      - name: Gerar e postar checklist no PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const typecheck = '${{ needs.static-analysis.outputs.typecheck }}';
            const lint      = '${{ needs.static-analysis.outputs.lint }}';
            const format    = '${{ needs.static-analysis.outputs.format }}';
            const qaOutcome = '${{ needs.static-analysis.outputs.qa_checks }}';

            // Parse do relatĂłrio JSON dos qa-checks
            let qaReport = null;
            try {
              qaReport = JSON.parse('${{ needs.static-analysis.outputs.qa_report }}');
            } catch (_) {}

            // â”€â”€ helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const icon = (outcome) => outcome === 'success' ? 'âś…' : outcome === 'failure' ? 'âťŚ' : 'â¬ś';
            const iconFromResults = (results, name) => {
              if (!results) return 'â¬ś';
              const r = results.find(r => r.name === name);
              if (!r) return 'â¬ś';
              if (r.violations.length === 0) return 'âś…';
              return r.level === 'error' ? 'âťŚ' : 'âš ď¸Ź';
            };
            const checkByItem = (label) => {
              if (!qaReport?.results) return 'â¬ś';
              const related = qaReport.results.filter(r => r.checklistItem === label);
              if (related.length === 0) return 'â¬ś';
              const hasError = related.some(r => r.violations.length > 0 && r.level === 'error');
              const hasWarn  = related.some(r => r.violations.length > 0 && r.level === 'warn');
              if (hasError) return 'âťŚ';
              if (hasWarn)  return 'âš ď¸Ź';
              return 'âś…';
            };
            const violationsOf = (name) => {
              const r = qaReport?.results?.find(r => r.name === name);
              return r?.violations?.slice(0, 3).map(v => `  > \`${v}\``).join('\n') ?? '';
            };

            // â”€â”€ status de cada check especĂ­fico â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const s = (name) => iconFromResults(qaReport?.results, name);

            // â”€â”€ resumo QA â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const summary = qaReport?.summary
              ? `**${qaReport.summary.passed} OK** Â· **${qaReport.summary.warn} âš ď¸Ź** Â· **${qaReport.summary.fail} âťŚ**`
              : '_nĂŁo disponĂ­vel_';

            // â”€â”€ violations detail (apenas errors/warns) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
            const failDetails = (qaReport?.results ?? [])
              .filter(r => r.violations.length > 0)
              .map(r => {
                const lvl = r.level === 'error' ? 'âťŚ' : 'âš ď¸Ź';
                const vs  = r.violations.slice(0, 3).map(v => `    - \`${v}\``).join('\n');
                const more = r.violations.length > 3 ? `\n    - _+${r.violations.length - 3} mais_` : '';
                return `${lvl} **${r.name}**\n${vs}${more}`;
              })
              .join('\n\n');

            const body = `## đź¤– QA Checklist AutomĂˇtico â€” Youse Seguradora

> Gerado por \`scripts/qa-pre-commit-checks.ts\` Â· ${qaReport?.filesAnalyzed ?? '?'} arquivo(s) analisado(s)

